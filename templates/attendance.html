<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FaceID | Mark Attendance</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- face-api.js -->
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <script src="/static/face_logic.js"></script>
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()"><i class="fa-solid fa-moon" id="t-icon"></i></button>

<div class="container flex" style="gap: 2rem; align-items: stretch; flex-wrap: wrap;">
        
        <div style="flex: 1; min-width: 300px;">
            <a href="/" style="text-decoration: none; color: var(--subtext); display: inline-block; margin-bottom: 20px;">
                <i class="fa-solid fa-arrow-left"></i> Back to Home
            </a>
            <h2>Verify Identity</h2>
            <p>Position your face in the center of the camera. The system will ensure liveness by asking you to blink.</p>
            
            <form method="POST" id="attendanceForm">
                <input type="hidden" name="image" id="image_data">
                
                <div class="form-group">
                    <label>Mode</label>
                    <select name="mode">
                        <option value="Entry">Entry (Check-in)</option>
                        <option value="Exit">Exit (Check-out)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Subject</label>
                    <select name="subject">
                        <option value="General">General</option>
                        <option value="Mathematics">Mathematics</option>
                        <option value="Science">Science</option>
                        <option value="History">History</option>
                        <option value="Computer Science">Computer Science</option>
                    </select>
                </div>

                <button type="button" class="btn btn-primary mt-4" id="submitBtn" disabled onclick="takeSnapshotAndSubmit()">
                    <i class="fa-solid fa-check-circle"></i> Capture & Verify
                </button>
            </form>
            
            <div style="margin-top: 20px; padding: 20px; background: rgba(79,70,229,0.05); border-radius: 12px; font-size: 0.85rem; border: 1px solid var(--border);">
                <i class="fa-solid fa-info-circle" style="color: var(--primary);"></i> Ensure you are in a well-lit area. 
                The capture button will unlock only when a single person blinks naturally.
            </div>
        </div>

        <div style="flex: 1; min-width: 300px; display: flex; flex-direction: column; justify-content: center; position: relative;">
            <div class="video-container">
                <video id="video" autoplay muted playsinline></video>
                <img id="preview">
                <canvas id="canvas"></canvas>
                <div class="overlay-msg" id="msgElement">Initializing Camera...</div>
            </div>

            <!-- Persistent Scan Result Card -->
            <div class="scan-result-card" id="scanResult">
                <div style="flex: 1;">
                    <h3 style="margin-bottom: 2px;" id="scanName">John Doe</h3>
                    <p style="margin-bottom: 0; color: var(--primary); font-weight: 600;" id="scanUSN">USN</p>
                </div>
                <div style="text-align: right;">
                    <span id="scanStatus" style="background: var(--success); color: var(--bg); padding: 4px 12px; border-radius: 4px; font-weight: 600; font-size: 0.85rem;">Success</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById("video");
        const preview = document.getElementById("preview");
        const canvas = document.getElementById("canvas");
        const imageInput = document.getElementById("image_data");
        const submitBtn = document.getElementById("submitBtn");
        const msgElement = document.getElementById("msgElement");
        const form = document.getElementById("attendanceForm");

        let streamObj = null;

        async function startCamera() {
            msgElement.style.display = "block";
            msgElement.innerText = "Loading AI Models...";
            
            try {
                streamObj = await navigator.mediaDevices.getUserMedia({video: true});
                video.srcObject = streamObj;
                preview.style.display = 'none';
                
                // Once models are loaded, the face_logic script handles enabling the button
                await loadModels();
                startFaceLogic(video, canvas, msgElement, submitBtn);
            } catch(e) {
                msgElement.innerText = "Camera Access Denied";
                msgElement.style.background = "rgba(239, 68, 68, 0.8)";
            }
        }

        async function takeSnapshotAndSubmit() {
            const tempCanvas = document.createElement("canvas");
            tempCanvas.width = video.videoWidth; 
            tempCanvas.height = video.videoHeight;
            tempCanvas.getContext("2d").drawImage(video, 0, 0);
            
            const data = tempCanvas.toDataURL("image/jpeg");
            
            msgElement.innerText = "Verifying...";
            msgElement.style.background = "rgba(59, 130, 246, 0.8)";
            submitBtn.disabled = true;

            const formData = new FormData(form);
            formData.set("image", data);

            try {
                const response = await fetch(window.location.pathname, {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                
                const scanResult = document.getElementById("scanResult");
                scanResult.style.display = "flex";
                
                if (result.status === "success") {
                    scanResult.className = "scan-result-card";
                    document.getElementById("scanName").innerText = result.name;
                    document.getElementById("scanUSN").innerText = result.usn;
                    document.getElementById("scanStatus").innerText = "Success";
                    document.getElementById("scanStatus").style.background = "var(--success)";
                } else {
                    scanResult.className = "scan-result-card error";
                    document.getElementById("scanName").innerText = "Unknown / Error";
                    document.getElementById("scanUSN").innerText = result.message;
                    document.getElementById("scanStatus").innerText = "Failed";
                    document.getElementById("scanStatus").style.background = "var(--danger)";
                }
            } catch(err) {
                alert("Error connecting to server.");
            }
            
            hasSmiled = false;
            msgElement.innerText = "Ready for next person.";
            msgElement.style.background = "rgba(16, 185, 129, 0.8)";
        }

        function toggleTheme() {
            const h = document.documentElement;
            const i = document.getElementById('t-icon');
            const isDark = h.getAttribute('data-theme') === 'dark';
            h.setAttribute('data-theme', isDark ? 'light' : 'dark');
            i.className = isDark ? 'fa-solid fa-moon' : 'fa-solid fa-sun';
            localStorage.setItem('theme', isDark ? 'light' : 'dark');
        }
        if(localStorage.getItem('theme') === 'dark') toggleTheme();

        document.addEventListener("DOMContentLoaded", startCamera);
    </script>
</body>
</html>
