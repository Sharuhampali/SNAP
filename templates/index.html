{% extends "layout.html" %}

{% block title %}Home{% endblock %}

{% block content %}
<div class="auth-card text-center">
    
    <div style="margin-bottom: 30px;">
        <i class="fa-solid fa-face-viewfinder" style="font-size: 4rem; color: var(--primary);"></i>
    </div>
    
    <h1 style="font-size: 2.5rem; margin-bottom: 10px;">FaceID System</h1>
    <p style="font-size: 1.1rem; margin-bottom: 40px;">Biometric attendance tracking with anti-spoofing and liveness detection.</p>
    
    <div style="display: flex; flex-direction: column; gap: 15px;">
        <a href="/login" class="btn btn-primary">
            <i class="fa-solid fa-right-to-bracket"></i> Login to Dashboard
        </a>
        <a href="/attendance" class="btn btn-outline">
            <i class="fa-solid fa-user-check"></i> Mark Attendance (Student)
        </a>
        <a href="/choose-register" class="btn btn-outline" style="border-color: transparent;">
            New User? Enroll Here
        </a>
    </div>

</div>
{% endblock %}
